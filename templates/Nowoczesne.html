<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>CV – {{name}}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      color: #222;
      line-height: 1.6;
      font-size: 14px;
      background: #f9fbfe;
      padding: 40px;
    }
    .cv-container {
      max-width: 800px;
      margin: auto;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      display: flex;
    }
    .left-column {
      width: 30%;
      background: #2c7be5;
      color: white;
      padding: 20px;
    }
    .left-column h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .left-column p {
      font-size: 13px;
      margin-bottom: 6px;
    }
    .section {
      margin-bottom: 20px;
    }
    .right-column {
      width: 70%;
      padding: 30px;
    }
    .right-column h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #2c7be5;
      border-bottom: 1px solid #e3f2fd;
      padding-bottom: 4px;
    }
    .right-column ul {
      list-style: none;
      padding-left: 0;
    }
    .right-column ul li {
      margin-bottom: 8px;
    }
    .right-column p {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="cv-container">
    <div class="left-column">
      <div class="section">
        <h1>{{name}}</h1>
        <p><strong>Email:</strong><br> {{email}}</p>
        <p><strong>Telefon:</strong><br> {{phone}}</p>
        <p><strong>Stanowisko:</strong><br> {{position}}</p>
      </div>
    </div>
    <div class="right-column">
      <div class="section">
        <h2>Doświadczenie</h2>
        <ul>
          {{experience}}
        </ul>
      </div>
      <div class="section">
        <h2>Wykształcenie</h2>
        <p>{{education}}</p>
      </div>
      <div class="section">
        <h2>Umiejętności</h2>
        <p>{{skills}}</p>
      </div>
      <div class="section">
        <h2>Języki</h2>
        <p>{{languages}}</p>
      </div>
      {{#if extra}}
      <div class="section">
        <h2>Dodatkowe informacje</h2>
        <p>{{extra}}</p>
      </div>
      {{/if}}
    </div>
  </div>

</body>
</html>
